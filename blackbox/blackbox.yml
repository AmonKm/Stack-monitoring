modules:

  # Sonde HTTP — vérifie qu'un site web répond en 200
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302]
      method: GET
      follow_redirects: true

  # Sonde TCP — vérifie qu'un port est ouvert
  tcp_connect:
    prober: tcp
    timeout: 5s

  # Sonde ICMP — ping
  icmp:
    prober: icmp
    timeout: 5s

  # Sonde DNS — vérifie qu'un serveur DNS résout
  dns_udp:
    prober: dns
    timeout: 5s
    dns:
      query_name: "google.com"
      query_type: "A"
      transport_protocol: "udp"

  # Sonde SMTP — vérifie que le serveur mail répond
  smtp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      query_response:
        - expect: "^220"    # banner SMTP attendu
