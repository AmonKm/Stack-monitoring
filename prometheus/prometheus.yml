global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: "monitoring"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          host: "monitoring"

  - job_name: "node"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.yml
        refresh_interval: 30s
