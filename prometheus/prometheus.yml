global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: "monitoring"
    static_configs:
      - targets: ["10.0.0.13:9100"]
        labels:
          role: "monitoring"
          env: "si-principal"

  - job_name: "node"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.yml
        refresh_interval: 30s


alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
