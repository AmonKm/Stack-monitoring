groups:
  - name: infrastructure
    interval: 30s
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Machine {{ $labels.hostname }} injoignable"
          description: "{{ $labels.job }} sur {{ $labels.hostname }} ne répond plus"

      - alert: HighCPU
        expr: instance:cpu_usage:rate5m > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU élevé sur {{ $labels.hostname }}"
          description: "CPU à {{ $value | printf \"%.1f\" }}%"

      - alert: HighMemory
        expr: instance:memory_available:ratio < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "RAM critique sur {{ $labels.hostname }}"
          description: "Mémoire disponible : {{ $value | printf \"%.1f\" }}%"

      - alert: DiskAlmostFull
        expr: (node_filesystem_avail_bytes{fstype!="tmpfs",mountpoint="/"} / node_filesystem_size_bytes{fstype!="tmpfs",mountpoint="/"}) * 100 < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disque presque plein sur {{ $labels.hostname }}"
          description: "Espace restant : {{ $value | printf \"%.1f\" }}%"

  - name: firewall
    interval: 30s
    rules:
      - alert: HighCPU_Firewall
        expr: instance:cpu_usage:rate5m{role="firewall"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU élevé sur pfsense"
          description: "CPU firewall à {{ $value | printf \"%.1f\" }}%"

      - alert: FirewallDown
        expr: up{role="firewall"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Firewall pfsense injoignable"
          description: "node_exporter pfsense ne répond plus"
