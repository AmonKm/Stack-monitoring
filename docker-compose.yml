services:

  # ─────────────────────────────────────────────
  # PROMETHEUS — collecte des métriques
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0       # Version
    container_name: prometheus
    restart: unless-stopped              # Redémarre automatiquement sauf arrêt manuel
    ports:
      - "127.0.0.1:9090:9090"           # Exposé uniquement en local (pas accessible depuis l'extérieur)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro   # Config principale (lecture seule)
      - ./prometheus/rules:/etc/prometheus/rules:ro                     # Règles d'alerte et recording rules
      - ./prometheus/targets:/etc/prometheus/targets:ro                 # Targets file_sd (discovery dynamique)
      - prometheus_data:/prometheus                                     # Volume persistant pour les métriques
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"                  # Fichier de config à charger
      - "--storage.tsdb.path=/prometheus"                               # Répertoire de stockage TSDB
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"   # Rétention : 30j par défaut (surchargeable via .env)
      - "--web.enable-lifecycle"                                        # Active le reload à chaud via POST /-/reload
      - "--log.level=warn"                                              # Logs silencieux sauf problème
    networks:
      - monitoring

  # ─────────────────────────────────────────────
  # MINIO — stockage objet S3 pour Loki
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest            # Stockage objet compatible S3 (remplace filesystem pour Loki)
    container_name: minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"           # Console web MinIO (accès local uniquement)
      - "127.0.0.1:9002:9000"           # API S3 (utilisée par Loki pour lire/écrire ses chunks)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}           # Identifiant admin (depuis .env)
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}   # Mot de passe admin (depuis .env)
      MINIO_REGION: us-east-1                       # Région fictive requise par l'API S3
    volumes:
      - minio_data:/data                            # Données persistantes du bucket
    command: server /data --console-address ":9001" # Lance le serveur + expose la console sur 9001
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]         # Vérifie que MinIO répond avant que Loki démarre
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MINIO-INIT — initialisation du bucket Loki
  # ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest               # Client MinIO (mc) pour créer le bucket au premier démarrage
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy       # Attend que MinIO soit prêt avant d'exécuter
    networks:
      - monitoring
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/loki;   # Crée le bucket 'loki' (sans erreur si déjà existant)
      echo 'Bucket loki créé';
      "

  # ─────────────────────────────────────────────
  # LOKI — stockage des logs
  # ─────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: loki
    restart: unless-stopped
    environment:
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER}         # Injecté dans loki-config.yml via expand-env
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD} # Idem — les creds MinIO servent d'accès S3
    ports:
      - "127.0.0.1:3100:3100"           # API Loki (Promtail pousse ici, Grafana lit ici)
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki                 # Données locales (index TSDB + cache)
    command:
      - "-config.file=/etc/loki/loki-config.yml"
      - "-config.expand-env=true"       # Permet d'utiliser ${VAR} dans le fichier de config Loki
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # PROMTAIL — collecte des logs
  # ─────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail
    restart: unless-stopped
    ports:
      - "127.0.0.1:1514:1514"           # Port syslog TCP/UDP (reçoit les logs des VMs via rsyslog)
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro                         # Logs système de la VM monitoring
      - /var/log/journal:/var/log/journal:ro         # Journal systemd (lecture directe)
      - /run/log/journal:/run/log/journal:ro         # Journal systemd volatile (session courante)
      - /etc/machine-id:/etc/machine-id:ro           # ID machine requis pour lire le journal
      - /var/log/syslog-remote:/var/log/syslog-remote:ro  # Logs reçus via rsyslog depuis les autres VMs
      - promtail_positions:/tmp                      # Sauvegarde la position de lecture (évite les doublons au redémarrage)
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy       # Attend que Loki soit prêt avant de pousser des logs
    networks:
      - monitoring

  # ─────────────────────────────────────────────
  # GRAFANA — dashboards et alertes
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"                     # Seul port exposé sans restriction IP (interface utilisateur)
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}         # Login admin (défaut : admin)
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}  # Mot de passe (à changer en prod !)
      - GF_USERS_ALLOW_SIGN_UP=false                           # Désactive l'auto-inscription
      - GF_FEATURE_TOGGLES_ENABLE=correlations                 # Active la feature de corrélation logs/métriques
      - GF_UNIFIED_ALERTING_ENABLED=true                       # Utilise le nouveau système d'alertes unifié
      - GF_LOG_LEVEL=warn                                      # Logs silencieux
    volumes:
      - grafana_data:/var/lib/grafana                          # Données persistantes (dashboards, users...)
      - ./grafana/provisioning:/etc/grafana/provisioning:ro    # Datasources et dashboards provisionnés automatiquement
      - ./grafana/dashboards:/etc/grafana/dashboards:ro        # Fichiers JSON des dashboards
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - monitoring

networks:
  monitoring:
    name: monitoring_stack   # Nom explicite du réseau Docker (tous les containers se voient par nom de service)
    driver: bridge           # Réseau bridge isolé = les containers sont isolés du reste de l'hôte

volumes:
  prometheus_data:    # Métriques Prometheus (séries temporelles)
  loki_data:          # Index et cache Loki (chunks dans MinIO)
  grafana_data:       # État Grafana (users, dashboards non-provisionnés, alertes)
  promtail_positions: # Fichier de position Promtail (suivi de lecture des logs)
  minio_data:         # Données brutes des buckets MinIO
