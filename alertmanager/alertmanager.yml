global:
  resolve_timeout: 5m
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'discord'
  routes:
    - match:
        severity: critical
      receiver: 'discord'
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: 'discord'
      repeat_interval: 1h
receivers:
  - name: 'discord'
    webhook_configs:
      - url: 'https://discord.com/api/webhooks/1488516454516003031/IQSOL1sF7ld2LLwd-f5CzE1-Sonh9donJp7S_pELjBRmg-LJ_Jlsre3HLfihs2-Nbj4g/slack'
        send_resolved: true
