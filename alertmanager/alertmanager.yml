global:
  resolve_timeout: 5m
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'discord'
  routes:
    - match:
        severity: critical
      receiver: 'discord'
      repeat_interval: 30m
    - match:
        severity: warning
      receiver: 'discord'
      repeat_interval: 1h
receivers:
  - name: 'discord'
    webhook_configs:
      - url: 'http://alertmanager-discord:9094'
        send_resolved: true
