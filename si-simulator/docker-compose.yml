services:

  dns01:
    image: ubuntu/bind9:latest
    container_name: dns01
    restart: unless-stopped
    networks:
      - monitoring_default

  dns01-node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: dns01-node-exporter
    restart: unless-stopped
    pid: "service:dns01"
    network_mode: "service:dns01"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  mail01:
    image: boky/postfix:latest
    container_name: mail01
    restart: unless-stopped
    environment:
      - ALLOWED_SENDER_DOMAINS=projet.local
    networks:
      - monitoring_default

  mail01-node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: mail01-node-exporter
    restart: unless-stopped
    pid: "service:mail01"
    network_mode: "service:mail01"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  honeypot:
    image: prom/node-exporter:v1.8.1
    container_name: honeypot
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    networks:
      - monitoring_default

networks:
  monitoring_default:
    external: true
