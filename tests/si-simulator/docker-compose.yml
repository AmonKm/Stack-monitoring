services:

  dns01:
    image: prom/node-exporter:v1.10.2
    container_name: dns01
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    networks:
      - monitoring_stack

  mail01:
    image: prom/node-exporter:v1.10.2
    container_name: mail01
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    networks:
      - monitoring_stack

  honeypot:
    image: prom/node-exporter:v1.10.2
    container_name: honeypot
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    networks:
      - monitoring_stack

networks:
  monitoring_stack:
    external: true
