server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:

  - job_name: "pfsense-syslog"
    syslog:
      listen_address: "0.0.0.0:514"
      labels:
        job: "pfsense"
        type: "firewall"
    pipeline_stages:
      - regex:
          expression: '.*filterlog.*(?P<action>block|pass).*(?P<proto>tcp|udp|icmp).*,(?P<src_ip>\d+\.\d+\.\d+\.\d+),(?P<dst_ip>\d+\.\d+\.\d+\.\d+),(?P<dst_port>\d+)'
      - labels:
          action:
          proto:
          src_ip:
          dst_port:

  - job_name: "varlogs"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "varlogs"
          host: "monitoring"
          __path__: /var/log/*.log

  - job_name: "syslog"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "syslog"
          host: "monitoring"
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '.*sshd.*(?P<action>Failed|Accepted) password.* from (?P<src_ip>\d+\.\d+\.\d+\.\d+)'
      - labels:
          action:
          src_ip:

  - job_name: "auth"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "auth"
          host: "monitoring"
          __path__: /var/log/auth.log
    pipeline_stages:
      - regex:
          expression: '.*sshd.*(?P<action>Failed|Accepted) password.* from (?P<src_ip>\d+\.\d+\.\d+\.\d+)'
      - labels:
          action:
          src_ip:

  - job_name: "honeypot-cowrie"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "honeypot"
          type: "cowrie"
          __path__: /var/log/cowrie/cowrie.json*
    pipeline_stages:
      - json:
          expressions:
            eventid: eventid
            src_ip: src_ip
            username: username
            password: password
            protocol: protocol
      - labels:
          eventid:
          src_ip:
          protocol:
