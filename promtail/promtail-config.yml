server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:

  # ── Journald (systemd) ────────────────────────────────────
  - job_name: "journald"
    journal:
      max_age: 12h
      labels:
        job: "journald"
        host: "monitoring"
    pipeline_stages:
      - labels:
          unit: __journal__systemd_unit__

  # ── Cowrie JSON (Honeypot) ────────────────────────────────
  - job_name: "honeypot-cowrie"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "honeypot"
          type: "cowrie"
          __path__: /var/log/cowrie/cowrie.json
    pipeline_stages:
      - json:
          expressions:
            eventid: eventid
            src_ip: src_ip
            username: username
            password: password
            protocol: protocol
      - labels:
          eventid:
          src_ip:
          protocol:
  # ── Syslog UDP 514 (pfsense + autres) ────────────────────
  - job_name: "syslog"
    syslog:
      listen_address: "0.0.0.0:514"
      listen_protocol: udp
      idle_timeout: 60s
      use_incoming_timestamp: true
      labels:
        job: "syslog"
    relabel_configs:
      - source_labels: [__syslog_message_hostname__]
        target_label: host
      - source_labels: [__syslog_message_app_name__]
        target_label: program
    pipeline_stages:
      # ── pfsense filterlog ─────────────────────────────────
      - match:
          selector: '{program="filterlog"}'
          stages:
            - regex:
                expression: '(?P<rule>\d+),[^,]*,[^,]*,[^,]*,(?P<interface>\w+),(?P<reason>\w+),(?P<action>block|pass),(?P<direction>in|out),(?P<ip_ver>\d+)(?:,[^,]*){9},(?P<src_ip>[\d.]+),(?P<dst_ip>[\d.]+),(?P<src_port>\d+),(?P<dst_port>\d+)'
                source: __syslog_message__
            - labels:
                interface:
                action:
                direction:
                src_ip:
                dst_ip:
                src_port:
                dst_port:

      # ── pfsense autres (dhcp, openvpn, etc.) ─────────────
      - match:
          selector: '{host="pfSense.home.arpa"}'
          stages:
            - labels:
                host:
                program:
