server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:

  # ── Journald (systemd) ─────────────────────────────────────
  - job_name: "journald"
    journal:
      max_age: 12h
      labels:
        job: "journald"
        host: "monitoring"
    pipeline_stages:
      - regex:
          expression: '.*sshd.*(?P<action>Failed|Accepted|Invalid) (?:password|user).* from (?P<src_ip>\d+\.\d+\.\d+\.\d+)'
      - labels:
          action:
          src_ip:

  # ── Cowrie JSON ────────────────────────────────────────────
  - job_name: "honeypot-cowrie"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "honeypot"
          type: "cowrie"
          __path__: /var/log/cowrie/cowrie.json
    pipeline_stages:
      - json:
          expressions:
            eventid: eventid
            src_ip: src_ip
            username: username
            password: password
            protocol: protocol
      - labels:
          eventid:
          src_ip:
          protocol:

  # ── pfSense syslog UDP ─────────────────────────────────────
  - job_name: "pfsense-syslog"
    syslog:
      listen_address: "0.0.0.0:514"
      idle_timeout: 60s
      label_structured_data: yes
      use_rfc5424_message: true
      labels:
        job: "pfsense"
        type: "firewall"
    pipeline_stages:
      - regex:
          expression: '.*filterlog.*(?P<action>block|pass).*(?P<proto>tcp|udp|icmp).*,(?P<src_ip>\d+\.\d+\.\d+\.\d+),(?P<dst_ip>\d+\.\d+\.\d+\.\d+),(?P<dst_port>\d+)'
      - labels:
          action:
          proto:
          src_ip:
          dst_port:
