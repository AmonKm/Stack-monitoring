server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:

  # ── Journald (VM monitoring) ──────────────────────────────
  - job_name: "journald"
    journal:
      max_age: 12h
      labels:
        job: "journald"
        host: "monitoring"
    pipeline_stages:
      - labels:
          unit: __journal__systemd_unit__

  # ── pfsense firewall (filterlog) ─────────────────────────
  - job_name: "pfsense-firewall"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "pfsense"
          host: "pfsense"
          type: "firewall"
          __path__: /var/log/syslog-remote/pfSense.home.arpa/filterlog.log
    pipeline_stages:
      - regex:
          expression: '(?P<rule>\d+),[^,]*,[^,]*,[^,]*,(?P<interface>\w+),(?P<reason>\w+),(?P<action>block|pass),(?P<direction>in|out),(?P<ip_ver>\d+)(?:,[^,]*){9},(?P<src_ip>[\d.]+),(?P<dst_ip>[\d.]+),(?P<src_port>\d+),(?P<dst_port>\d+)'
      - labels:
          interface:
          action:
          direction:
          src_ip:
          dst_ip:
          src_port:
          dst_port:

  # ── pfsense autres logs ───────────────────────────────────
  - job_name: "pfsense-system"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "pfsense"
          host: "pfsense"
          type: "system"
          __path__: /var/log/syslog-remote/pfSense.home.arpa/*.log

  # ── VM mail ───────────────────────────────────────────────
  - job_name: "mail"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "mail"
          host: "mail-01"
          __path__: /var/log/syslog-remote/mail-01/*.log

  # ── VM DHCP ───────────────────────────────────────────────
  - job_name: "dhcp"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "dhcp"
          host: "dhcp-01"
          __path__: /var/log/syslog-remote/dhcp-01/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<type>DHCPREQUEST|DHCPACK|DHCPOFFER|DHCPDISCOVER|DHCPNAK|DHCPRELEASE) (?:for|on) (?P<ip>[\d.]+) (?:from|to) (?P<mac>[0-9a-f:]+)(?: \((?P<hostname>[^)]+)\))?'
      - labels:
          type:
          ip:
          hostname:

  # ── VM web ────────────────────────────────────────────────
  - job_name: "web"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "web"
          host: "web-01"
          __path__: /var/log/syslog-remote/web-01/*.log
