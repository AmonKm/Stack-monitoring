  # ── pfsense filterlog (via rsyslog) ──────────────────────
  - job_name: "pfsense-filterlog"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "pfsense"
          host: "pfsense"
          __path__: /var/log/pfsense/filterlog.log
    pipeline_stages:
      - regex:
          expression: '(?P<rule>\d+),[^,]*,[^,]*,[^,]*,(?P<interface>\w+),(?P<reason>\w+),(?P<action>block|pass),(?P<direction>in|out),(?P<ip_ver>\d+)(?:,[^,]*){9},(?P<src_ip>[\d.]+),(?P<dst_ip>[\d.]+),(?P<src_port>\d+),(?P<dst_port>\d+)'
      - labels:
          interface:
          action:
          direction:
          src_ip:
          dst_ip:
          src_port:
          dst_port:

  # ── pfsense autres logs (via rsyslog) ────────────────────
  - job_name: "pfsense-syslog"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "pfsense"
          host: "pfsense"
          __path__: /var/log/pfsense/pfsense.log
