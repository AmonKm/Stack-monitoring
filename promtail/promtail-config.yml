  # ── Syslog UDP 514 ────────────────────────────────────────
  - job_name: "syslog"
    syslog:
      listen_address: "0.0.0.0:514"
      listen_protocol: udp
      idle_timeout: 60s
      use_incoming_timestamp: true
      labels:
        job: "syslog"

  # ── pfsense filterlog (fichier) ───────────────────────────
  - job_name: "pfsense"
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "pfsense"
          host: "pfsense"
          __path__: /var/log/pfsense/filterlog.log
    pipeline_stages:
      - regex:
          expression: '(?P<rule>\d+),[^,]*,[^,]*,[^,]*,(?P<interface>\w+),(?P<reason>\w+),(?P<action>block|pass),(?P<direction>in|out),(?P<ip_ver>\d+)(?:,[^,]*){9},(?P<src_ip>[\d.]+),(?P<dst_ip>[\d.]+),(?P<src_port>\d+),(?P<dst_port>\d+)'
      - labels:
          interface:
          action:
          direction:
          src_ip:
          dst_ip:
          src_port:
          dst_port:
