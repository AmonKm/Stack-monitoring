---
- name: Installer monitoring sur toutes les machines du SI
  hosts: si                        # groupe défini dans l'inventaire
  become: yes                      # sudo
  roles:
    - monitoring-client

# Après installation, regénérer les targets Prometheus
- name: Mettre à jour les targets Prometheus
  hosts: monitoring                # votre VM
  become: yes
  tasks:
    - name: Générer targets/si.yml
      template:
        src: roles/monitoring-client/templates/targets.yml.j2
        dest: /opt/monitoring/prometheus/targets/si.yml

    - name: Recharger Prometheus
      uri:
        url: "http://localhost:9090/-/reload"
        method: POST
        status_code: 200
